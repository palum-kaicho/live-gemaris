href="css/style.css">

<!-- 💡 スマホで絶対に崩さないためのマジックCSS（既存のcss/index.cssやstyle.cssに追記してもOKやで！） -->
<style>
  .apply-form {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 15px;
  }
  .form-group {
    margin-bottom: 25px;
    display: flex;
    flex-direction: column; /* 💡 ラベルと入力を確実に縦並びにする */
    align-items: flex-start;
  }
  .form-group label {
    font-weight: 600;
    margin-bottom: 8px;
    color: #2b2b2b;
    font-size: 0.95rem;
  }
  /* 💡 入力要素をスマホ画面幅いっぱいに綺麗に広げる */
  .form-group input[type="text"],
  .form-group input[type="email"],
  .form-group select,
  .form-group textarea {
    width: 100% !important;
    max-width: 100% !important;
    box-sizing: border-box;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    background-color: #fff;
  }
  .form-group select {
    cursor: pointer;
    height: auto;
  }
  /* 送信ボタンの横幅も100%にして押しやすく */
  .full-btn {
    width: 100% !important;
    padding: 16px !important;
    font-size: 1.1rem !important;
    font-weight: bold !important;
    border-radius: 6px !important;
    cursor: pointer;
  }
</style>

</head>

<div class="form-group">

<script>
    const hamburger = document.getElementById('js-hamburger');
    const navMenu = document.getElementById('js-nav-menu');

    // ハンバーガーボタンのクリックイベント
    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('is-active');
    });

    // 💡 別のページから「戻る」で戻ってきたときに状態を完全リセットする魔法の処理
    window.addEventListener('pageshow', (event) => {
        // キャッシュから読み込まれた場合（戻るボタンなど）でも強制リセット
        if (navMenu) {
            navMenu.classList.remove('is-active');
        }
    });

    // リンクをクリックしてメニューが閉じないバグもついでに予防（念のため）
    const navLinks = navMenu.querySelectorAll('a');
    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            navMenu.classList.remove('is-active');
        });
    });
</script>
